{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-4">
  <div class="col-md-5">
    <div class="card text-center" style="border:1px solid rgba(239,68,68,.2);">
      <div class="card-body py-5">
        <div style="width:70px;height:70px;border-radius:50%;background:rgba(239,68,68,.08);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;font-size:2rem;color:#dc2626;"><i class="bi bi-trash3-fill"></i></div>
        <h5 class="fw-bold mb-2">Delete Customer?</h5>
        <p class="text-muted">Are you sure you want to permanently delete <strong>{{ customer.full_name }}</strong>? This action cannot be undone and may affect their loan records.</p>
        <div class="d-flex gap-2 justify-content-center mt-3">
          <form method="post">{% csrf_token %}
            <button type="submit" class="btn btn-danger"><i class="bi bi-trash me-1"></i>Yes, Delete</button>
          </form>
          <a href="{% url 'loan_customer_detail' customer.pk %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
