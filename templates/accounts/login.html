{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ChitFund Management</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!--website icon -->
    <link rel="icon" href="https://res.cloudinary.com/de1tywvqm/image/upload/q_auto/f_auto/v1775131032/Gemini_Generated_Image__1_qoe19x.png">
    <style>
        :root {
            --primary-color: #16A34A;
            --secondary-color: #10b981;
            --dark-blue: #0f172a;
            --text-muted: #64748b;
            --bg-neutral: #f8fafc;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-neutral);
            color: var(--dark-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        
        .login-card {
            background: #FFFFFF;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2.5rem;
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--dark-blue);
        }
        .brand-logo i {
            color: var(--primary-color);
            font-size: 2.2rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .brand-logo span {
            color: var(--primary-color);
        }

        .form-control {
            border-radius: 12px;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border-color);
            background-color: #fff;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }
        
        .form-label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.4rem;
        }

        .btn-login {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }
        
        .btn-login:hover {
            background-color: #1dd823;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
        }

        .forgot-link {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }

        .back-home {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-home a {
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        .back-home a:hover {
            color: var(--primary-color);
        }

        .bg-shapes {
            position: absolute;
            z-index: -1;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
        }
        .circle-1, .circle-2 {
            position: absolute;
            border-radius: 50%;
            background: linear-gradient(135deg, rgba(22, 163, 74, 0.1) 0%, rgba(22, 163, 74, 0) 100%);
        }
        .circle-1 {
            width: 600px;
            height: 600px;
            top: -200px;
            right: -150px;
        }
        .circle-2 {
            width: 400px;
            height: 400px;
            bottom: -100px;
            left: -100px;
        }
    </style>
</head>
<body>

<div class="bg-shapes">
    <div class="circle-1"></div>
    <div class="circle-2"></div>
</div>

<div class="login-card">
    <div class="brand-logo">
        <i class="bi bi-shield-check"></i>
        Smart<span>Chit</span>
    </div>
    
    <form method="post">
        {% csrf_token %}
        <div class="input-group-custom mb-3">
            <label class="form-label">Username</label>
            <input type="text" name="username" class="form-control" required placeholder="Enter your username">
        </div>
        <div class="input-group-custom mb-4">
            <label class="form-label">Password</label>
            <div class="position-relative">
                <input type="password" name="password" id="passwordInput" class="form-control pe-5" required placeholder="••••••••">
                <i class="bi bi-eye-slash position-absolute" id="togglePassword" style="right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 1.1rem; z-index: 10;"></i>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input shadow-none" type="checkbox" id="rememberMe" style="cursor: pointer;">
                <label class="form-check-label small text-muted" for="rememberMe" style="cursor: pointer;">Remember me</label>
            </div>
            <a href="{% url 'password_reset' %}" class="forgot-link">Forgot Password?</a>
        </div>

        {% if form.errors %}
            <div class="alert alert-danger p-2 small border-0 text-center" style="border-radius: 8px;">
                Invalid credentials. Please try again.
            </div>
        {% endif %}
        
        <button type="submit" class="btn-login">
            Sign In <i class="bi bi-arrow-right-short ms-2"></i>
        </button>
    </form>

    <!-- <div class="back-home">
        <a href="{% url 'landing' %}"><i class="bi bi-house-door me-2"></i>Back to Home</a>
    </div> -->
</div>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#passwordInput');

    togglePassword.addEventListener('click', function (e) {
        // toggle the type attribute
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        // toggle the icon
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
        // Add a subtle color focus when viewing
        this.style.color = type === 'text' ? 'var(--primary-color)' : 'var(--text-muted)';
    });
</script>
</body>
</html>
