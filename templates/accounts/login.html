{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SmartFinance Unified</title>
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Google Fonts: Inter & Plus Jakarta Sans -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- NProgress for fast visual feedback -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">
    
    <link rel="icon" href="https://res.cloudinary.com/de1tywvqm/image/upload/q_auto/f_auto/v1775131032/Gemini_Generated_Image__1_qoe19x.png">
    <style>
        :root {
            --primary-color: #16A34A;
            --primary-glow: rgba(22, 163, 74, 0.15);
            --dark-blue: #0f172a;
            --text-muted: #64748b;
            --bg-neutral: #f8fafc;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9;
            color: var(--dark-blue);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }
        
        /* Premium Background Animation */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-color: #f1f5f9;
            background-image: 
                radial-gradient(at 0% 0%, rgba(22, 163, 74, 0.08) 0, transparent 50%), 
                radial-gradient(at 50% 0%, rgba(79, 70, 229, 0.05) 0, transparent 50%), 
                radial-gradient(at 100% 0%, rgba(22, 163, 74, 0.08) 0, transparent 50%);
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.12);
            width: 100%;
            max-width: 440px;
            padding: 3.5rem 3rem;
            position: relative;
            animation: fadeInScale 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .brand-section {
            text-align: center;
            margin-bottom: 3rem;
        }
        .brand-logo-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #16A34A 0%, #10b981 100%);
            border-radius: 18px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.2);
            color: white;
            font-size: 1.8rem;
        }
        .brand-name {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 800;
            font-size: 1.85rem;
            color: var(--dark-blue);
            letter-spacing: -1px;
            margin-bottom: 0.25rem;
        }
        .brand-name span { color: var(--primary-color); }
        .brand-tagline {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
        }

        .form-label {
            font-weight: 700;
            color: var(--dark-blue);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.6rem;
            display: block;
        }

        .form-control {
            border-radius: 14px;
            padding: 0.9rem 1.1rem;
            border: 1.5px solid var(--border-color);
            background-color: #f8fafc;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.95rem;
            font-weight: 500;
        }
        .form-control:focus {
            background-color: #fff;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px var(--primary-glow);
            transform: translateY(-2px);
            outline: none;
        }
        
        .btn-login {
            background: linear-gradient(135deg, #16A34A 0%, #15803d 100%);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(22, 163, 74, 0.25);
            margin-top: 1rem;
        }
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(22, 163, 74, 0.35);
            filter: brightness(1.1);
        }
        .btn-login:active { transform: translateY(-1px); }

        .forgot-link {
            text-decoration: none;
            color: var(--primary-color);
            font-weight: 700;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.8; }

        .alert-custom {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fee2e2;
            border-radius: 12px;
            padding: 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            text-align: center;
        }

        #nprogress .bar { background: var(--primary-color) !important; }
    </style>
</head>
<body>

<div class="bg-mesh"></div>

<div class="login-card">
    <div class="brand-section">
        <div class="brand-logo-icon">
            <i class="bi bi-bank2"></i>
        </div>
        <div class="brand-name">Smart<span>Finance</span></div>
        <div class="brand-tagline">Unified Management Portal</div>
    </div>
    
    <form method="post" id="loginForm">
        {% csrf_token %}
        <div class="mb-4">
            <label class="form-label">Account Identity</label>
            <input type="text" name="username" class="form-control" required placeholder="Enter Username..." autocomplete="username">
        </div>
        
        <div class="mb-4">
            <label class="form-label">Security Key</label>
            <div class="position-relative">
                <input type="password" name="password" id="passwordInput" class="form-control pe-5" required placeholder="••••••••" autocomplete="current-password">
                <i class="bi bi-eye-slash position-absolute" id="togglePassword" style="right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; color: var(--text-muted); font-size: 1.15rem; z-index: 10;"></i>
            </div>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="form-check">
                <input class="form-check-input shadow-none" type="checkbox" id="rememberMe" style="cursor: pointer;">
                <label class="form-check-label small text-muted fw-bold" for="rememberMe" style="cursor: pointer; font-size: 0.8rem;">Trust this device</label>
            </div>
            <a href="{% url 'password_reset' %}" class="forgot-link">Access Recovery</a>
        </div>

        {% if form.errors %}
            <div class="alert-custom">
                <i class="bi bi-exclamation-circle me-2"></i> Verification failed. Please check credentials.
            </div>
        {% endif %}
        
        <button type="submit" class="btn-login" id="submitBtn">
            Secure Sign In <i class="bi bi-shield-lock-fill ms-2"></i>
        </button>
</div>

<script>
    NProgress.configure({ showSpinner: false });
    NProgress.start();
    
    window.onload = function() {
        NProgress.done();
    };

    const togglePassword = document.querySelector('#togglePassword');
    const password = document.querySelector('#passwordInput');

    togglePassword.addEventListener('click', function (e) {
        // toggle the type attribute
        const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
        password.setAttribute('type', type);
        // toggle the icon
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
        // Add a subtle color focus when viewing
        this.style.color = type === 'text' ? 'var(--primary-color)' : 'var(--text-muted)';
    });

    document.querySelector('form').addEventListener('submit', function() {
        NProgress.start();
        this.querySelector('button').innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Signing In...';
        this.querySelector('button').disabled = true;
    });
</script>
</body>
</html>
