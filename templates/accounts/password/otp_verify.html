{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify OTP - ChitFund Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!--website icon -->
    <link rel="icon" href="https://res.cloudinary.com/de1tywvqm/image/upload/q_auto/f_auto/v1775131032/Gemini_Generated_Image__1_qoe19x.png">
    <style>
        :root {
            --primary-color: #16A34A;
            --secondary-color: #10b981;
            --dark-blue: #0f172a;
            --text-muted: #64748b;
            --bg-neutral: #f8fafc;
            --border-color: #e2e8f0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-neutral);
            color: var(--dark-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .login-card {
            background: #FFFFFF;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--dark-blue);
        }
        .brand-logo i {
            color: var(--primary-color);
            font-size: 2.2rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .brand-logo span {
            color: var(--primary-color);
        }
        .otp-input {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 2rem;
        }
        .otp-input input {
            width: 50px;
            height: 60px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: #fff;
            transition: all 0.3s ease;
        }
        .otp-input input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            outline: none;
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo">
            <i class="bi bi-shield-lock"></i>
            Verify <span>OTP</span>
        </div>
        <p class="text-muted text-center mb-4 small">An OTP has been sent to your email. Please enter the 6-digit code below to verify.</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} p-2 small border-0 text-center mb-4" style="border-radius: 8px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="otp-input">
                <input type="text" maxlength="1" oninput="moveToNext(this, 1)" onkeydown="moveToPrev(this, 0)" required>
                <input type="text" maxlength="1" oninput="moveToNext(this, 2)" onkeydown="moveToPrev(this, 1)" required>
                <input type="text" maxlength="1" oninput="moveToNext(this, 3)" onkeydown="moveToPrev(this, 2)" required>
                <input type="text" maxlength="1" oninput="moveToNext(this, 4)" onkeydown="moveToPrev(this, 3)" required>
                <input type="text" maxlength="1" oninput="moveToNext(this, 5)" onkeydown="moveToPrev(this, 4)" required>
                <input type="text" maxlength="1" oninput="moveToNext(this, 6)" onkeydown="moveToPrev(this, 5)" required>
            </div>
            <input type="hidden" name="otp" id="full_otp">
            
            <button type="submit" class="btn-primary" onclick="combineOTP()">
                Verify OTP <i class="bi bi-check2-circle ms-2"></i>
            </button>
        </form>

        <div class="text-center mt-4">
            <a href="{% url 'password_reset' %}" class="text-muted small text-decoration-none">Resend OTP</a>
        </div>
    </div>

    <script>
        function moveToNext(el, next) {
            if (el.value.length === 1) {
                const inputs = document.querySelectorAll('.otp-input input');
                if (next < inputs.length) {
                    inputs[next].focus();
                }
            }
        }

        function moveToPrev(el, prev) {
            if (event.key === "Backspace" && el.value.length === 0) {
                const inputs = document.querySelectorAll('.otp-input input');
                if (prev >= 0) {
                    inputs[prev].focus();
                }
            }
        }

        function combineOTP() {
            let otp = '';
            document.querySelectorAll('.otp-input input').forEach(input => {
                otp += input.value;
            });
            document.getElementById('full_otp').value = otp;
        }
    </script>
    
</body>
</html>
