<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Changed - ChitFund Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!--website icon -->
    <link rel="icon" href="https://res.cloudinary.com/de1tywvqm/image/upload/q_auto/f_auto/v1775131032/Gemini_Generated_Image__1_qoe19x.png">
    <style>
        :root {
            --primary-color: #16A34A;
            --secondary-color: #10b981;
            --dark-blue: #0f172a;
            --text-muted: #64748b;
            --bg-neutral: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-neutral);
            color: var(--dark-blue);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .login-card {
            background: #FFFFFF;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
            text-align: center;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--dark-blue);
        }
        .brand-logo i {
            color: var(--secondary-color);
            font-size: 3rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .brand-logo span {
            color: var(--primary-color);
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
            text-decoration: none;
            display: block;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo">
            <i class="bi bi-shield-check"></i>
            Reset <span>Complete</span>
        </div>
        <p class="text-muted mb-4">Your password has been successfully set. You may now log in with your new password.</p>
        
        <a href="{% url 'login' %}" class="btn-primary">
            Log In Now
        </a>
    </div>
</body>
</html>
