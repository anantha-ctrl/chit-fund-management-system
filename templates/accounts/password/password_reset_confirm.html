{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password - ChitFund Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <!--website icon -->
    <link rel="icon" href="https://res.cloudinary.com/de1tywvqm/image/upload/q_auto/f_auto/v1775131032/Gemini_Generated_Image__1_qoe19x.png">
    <style>
        :root {
            --primary-color: #16A34A;
            --secondary-color: #10b981;
            --dark-blue: #0f172a;
            --text-muted: #64748b;
            --bg-neutral: #f8fafc;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-neutral);
            color: var(--dark-blue);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
        }
        .login-card {
            background: #FFFFFF;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
            width: 100%;
            max-width: 420px;
            padding: 3rem 2.5rem;
        }
        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
            font-weight: 800;
            font-size: 1.75rem;
            color: var(--dark-blue);
        }
        .brand-logo i {
            color: var(--primary-color);
            font-size: 2.2rem;
            display: block;
            margin-bottom: 0.5rem;
        }
        .brand-logo span {
            color: var(--primary-color);
        }
        .form-control {
            border-radius: 12px;
            padding: 0.85rem 1rem;
            border: 1px solid #e2e8f0;
            background-color: #fff;
            transition: all 0.3s ease;
            font-size: 0.95rem;
        }
        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            transform: translateY(-2px);
        }
        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 0.9rem;
            font-weight: 600;
            font-size: 1rem;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.2);
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.3);
        }
        .password-toggle-container {
            position: relative;
        }
        .password-toggle-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            z-index: 10;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-logo">
            <i class="bi bi-shield-lock"></i>
            New <span>Password</span>
        </div>
        <p class="text-muted text-center mb-4 small">Set a strong password to protect your account.</p>
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} p-2 small border-0 text-center mb-4" style="border-radius: 8px;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label small text-muted font-weight-bold">New Password</label>
                <div class="password-toggle-container">
                    <input type="password" name="password" class="form-control" id="id_password" placeholder="••••••••" required>
                    <i class="bi bi-eye-slash password-toggle-icon" id="togglePassword"></i>
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label small text-muted font-weight-bold">Confirm Password</label>
                <div class="password-toggle-container">
                    <input type="password" name="confirm_password" class="form-control" id="id_confirm_password" placeholder="••••••••" required>
                    <i class="bi bi-eye-slash password-toggle-icon" id="toggleConfirmPassword"></i>
                </div>
            </div>
            
            <button type="submit" class="btn-primary">
                Reset Password <i class="bi bi-arrow-right-short ms-2"></i>
            </button>
        </form>
    </div>
    <script>
        function setupToggle(toggleId, inputId) {
            const toggleBtn = document.querySelector(toggleId);
            const inputField = document.querySelector(inputId);
            if (toggleBtn && inputField) {
                toggleBtn.addEventListener('click', function() {
                    const type = inputField.getAttribute('type') === 'password' ? 'text' : 'password';
                    inputField.setAttribute('type', type);
                    this.classList.toggle('bi-eye');
                    this.classList.toggle('bi-eye-slash');
                });
            }
        }
        setupToggle('#togglePassword', '#id_password');
        setupToggle('#toggleConfirmPassword', '#id_confirm_password');
    </script>
</body>
</html>
