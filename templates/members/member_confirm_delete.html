{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Are you sure?</h1>
</div>

<div class="row">
    <div class="col-md-6">
        <div class="card text-center shadow-sm border-danger">
            <div class="card-body">
                <i class="bi bi-exclamation-triangle text-danger display-1"></i>
                <h4 class="mt-3">Delete {{ member.name }}?</h4>
                <p class="text-muted">This action cannot be undone and may affect associated records.</p>
                <form method="post">
                    {% csrf_token %}
                    <br>
                    <button type="submit" class="btn btn-danger btn-lg px-5">Yes, Delete</button>
                    <a href="{% url 'member_list' %}" class="btn btn-secondary btn-lg ms-2 px-4">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
