{% extends 'base.html' %}

{% block content %}
<div class="d-flex flex-column flex-sm-row justify-content-between align-items-start align-items-sm-center mb-4 gap-3">
    <h1 class="page-title mb-0">{{ title }}</h1>
    <a href="{% url 'payment_list' %}" class="btn btn-light border shadow-sm rounded-pill px-4 btn-sm py-2">
        <i class="bi bi-arrow-left me-1"></i> Finance Stream
    </a>
</div>

<div class="row justify-content-center">
    <div class="col-md-10 col-lg-8">
        <div class="card border-0 shadow-sm" style="border-radius: 20px; overflow: hidden;">
            <!-- Header Section -->
            <div class="p-4 bg-primary bg-opacity-10 d-flex align-items-center">
                <div class="rounded-circle p-3 bg-white text-primary me-3 shadow-sm">
                    <i class="bi bi-currency-rupee fs-4"></i>
                </div>
                <div>
                    <h5 class="fw-bold mb-0">Transaction Details</h5>
                    <p class="text-muted small mb-0">Record and verify chit collection data</p>
                </div>
            </div>

            <div class="card-body p-4 p-xl-5">
                <form method="post">
                    {% csrf_token %}
                    <div class="row g-4">
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select name="chit_group" class="form-select" id="id_chit_group" required>
                                    {% for choice in form.fields.chit_group.queryset %}
                                        <option value="{{ choice.pk }}" {% if choice.pk == form.instance.chit_group_id %}selected{% endif %}>{{ choice }}</option>
                                    {% endfor %}
                                </select>
                                <label for="id_chit_group"><i class="bi bi-collection-play me-2"></i>Chit Group</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select name="member" class="form-select" id="id_member" required>
                                    {% for choice in form.fields.member.queryset %}
                                        <option value="{{ choice.pk }}" {% if choice.pk == form.instance.member_id %}selected{% endif %}>{{ choice }}</option>
                                    {% endfor %}
                                </select>
                                <label for="id_member"><i class="bi bi-person-badge me-2"></i>Member Name</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="number" name="installment_number" value="{{ form.instance.installment_number|default:1 }}" class="form-control" id="id_installment_number" placeholder="Inst #" required>
                                <label for="id_installment_number"><i class="bi bi-hash me-2"></i>Installment Number</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="number" step="0.01" name="amount" value="{{ form.instance.amount|default:0 }}" class="form-control" id="id_amount" placeholder="Amount" required>
                                <label for="id_amount"><i class="bi bi-cash-stack me-2"></i>Amount (₹)</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <input type="date" name="payment_date" value="{{ form.instance.payment_date|date:'Y-m-d'|default:'' }}" class="form-control" id="id_payment_date">
                                <label for="id_payment_date"><i class="bi bi-calendar-event me-2"></i>Payment Date</label>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <div class="form-floating">
                                <select name="status" class="form-select" id="id_status" required>
                                    {% for val, label in form.fields.status.choices %}
                                        <option value="{{ val }}" {% if val == form.instance.status %}selected{% endif %}>{{ label }}</option>
                                    {% endfor %}
                                </select>
                                <label for="id_status"><i class="bi bi-shield-check me-2"></i>Transaction Status</label>
                            </div>
                        </div>
                    </div>

                    <div class="mt-5 border-top pt-4 d-flex gap-3">
                        <button type="submit" class="btn btn-primary rounded-pill px-4 py-2 fw-bold shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i> Confirm Transaction
                        </button>
                        <a href="{% url 'payment_list' %}" class="btn btn-light border px-4 rounded-pill py-2 fw-medium">Discard</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
