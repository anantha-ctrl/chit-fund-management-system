<div class="row g-4 mb-4">
    <div class="col-md-6 col-lg-3">
        <div class="card h-100 border-0 shadow-sm overflow-hidden" style="border-radius: 16px;">
            <div class="card-body p-4 d-flex align-items-center">
                <div class="rounded-3 p-3 me-3" style="background-color: var(--primary-light); color: var(--primary-green);">
                    <i class="bi bi-people-fill fs-3"></i>
                </div>
                <div>
                    <h6 class="text-muted fw-bold text-uppercase mb-1" style="font-size: 0.7rem; letter-spacing: 0.5px;">Members</h6>
                    <h1 class="mb-0 fw-bold">{{ total_members }}</h1>
                </div>
            </div>
            <div class="bg-success opacity-10 position-absolute w-100 bottom-0" style="height: 4px;"></div>
        </div>
    </div>
    
    <div class="col-md-6 col-lg-3">
        <div class="card h-100 border-0 shadow-sm overflow-hidden" style="border-radius: 16px;">
            <div class="card-body p-4 d-flex align-items-center">
                <div class="rounded-3 p-3 me-3" style="background-color: #e0f2fe; color: #0284c7;">
                    <i class="bi bi-buildings-fill fs-3"></i>
                </div>
                <div>
                    <h6 class="text-muted fw-bold text-uppercase mb-1" style="font-size: 0.7rem; letter-spacing: 0.5px;">Branches</h6>
                    <h1 class="mb-0 fw-bold">{{ total_branches }}</h1>
                </div>
            </div>
            <div class="bg-info opacity-10 position-absolute w-100 bottom-0" style="height: 4px;"></div>
        </div>
    </div>
    
    <div class="col-md-6 col-lg-3">
        <div class="card h-100 border-0 shadow-sm overflow-hidden" style="border-radius: 16px;">
            <div class="card-body p-4 d-flex align-items-center">
                <div class="rounded-3 p-3 me-3" style="background-color: #fef3c7; color: #d97706;">
                    <i class="bi bi-wallet2 fs-3"></i>
                </div>
                <div>
                    <h6 class="text-muted fw-bold text-uppercase mb-1" style="font-size: 0.7rem; letter-spacing: 0.5px;">Receipts</h6>
                    <h1 class="mb-0 fw-bold">₹{{ total_received }}</h1>
                </div>
            </div>
            <div class="bg-warning opacity-10 position-absolute w-100 bottom-0" style="height: 4px;"></div>
        </div>
    </div>
    
    <div class="col-md-6 col-lg-3">
        <div class="card h-100 border-0 shadow-sm overflow-hidden" style="border-radius: 16px;">
            <div class="card-body p-4 d-flex align-items-center">
                <div class="rounded-3 p-3 me-3" style="background-color: #fee2e2; color: #dc2626;">
                    <i class="bi bi-shield-exclamation fs-3"></i>
                </div>
                <div>
                    <h6 class="text-muted fw-bold text-uppercase mb-1" style="font-size: 0.7rem; letter-spacing: 0.5px;">High Risk</h6>
                    <h1 class="mb-0 fw-bold">₹{{ total_pending }}</h1>
                </div>
            </div>
            <div class="bg-danger opacity-10 position-absolute w-100 bottom-0" style="height: 4px;"></div>
        </div>
    </div>
</div>
